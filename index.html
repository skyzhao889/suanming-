<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>紫微命盘·天机测算</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0d0221 0%, #1a0533 40%, #0d1a33 100%);
      font-family: 'Ma Shan Zheng', '楷体', KaiTi, serif;
      color: #f0d080;
      overflow-x: hidden;
    }

    /* 星空背景 */
    .stars {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--dur, 3s) infinite ease-in-out;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.4); }
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 30px 20px 60px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    .header .title-icon {
      font-size: 52px;
      display: block;
      margin-bottom: 8px;
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .header h1 {
      font-size: 30px;
      letter-spacing: 6px;
      color: #ffd700;
      text-shadow: 0 0 20px rgba(255,215,0,0.6), 0 0 40px rgba(255,180,0,0.3);
    }
    .header p {
      font-size: 14px;
      color: #c8a060;
      margin-top: 6px;
      letter-spacing: 2px;
    }

    /* 卡片 */
    .card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 215, 0, 0.2);
      border-radius: 20px;
      padding: 28px 24px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .card-title {
      font-size: 18px;
      color: #ffd700;
      letter-spacing: 3px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title::before, .card-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,215,0,0.4), transparent);
    }

    /* 表单 */
    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-size: 14px;
      color: #d4a840;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }
    .form-group label span {
      color: #ff6b6b;
      margin-left: 2px;
    }
    .form-control {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,215,0,0.25);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 16px;
      font-family: inherit;
      color: #f5e6c8;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .form-control:focus {
      border-color: rgba(255,215,0,0.7);
      box-shadow: 0 0 0 3px rgba(255,215,0,0.1);
    }
    .form-control::placeholder { color: rgba(255,215,0,0.3); }
    select.form-control option {
      background: #1a0533;
      color: #f5e6c8;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* 提交按钮 */
    .btn-fortune {
      width: 100%;
      margin-top: 24px;
      padding: 16px;
      background: linear-gradient(135deg, #b8860b, #ffd700, #b8860b);
      background-size: 200% auto;
      border: none;
      border-radius: 50px;
      font-size: 18px;
      font-family: inherit;
      color: #1a0533;
      font-weight: bold;
      letter-spacing: 4px;
      cursor: pointer;
      animation: shimmer 3s linear infinite;
      box-shadow: 0 4px 20px rgba(255,215,0,0.3);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-fortune:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(255,215,0,0.5);
    }
    .btn-fortune:active { transform: translateY(0); }
    @keyframes shimmer {
      0% { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    /* 加载动画 */
    .loading {
      display: none;
      text-align: center;
      padding: 40px 0;
    }
    .loading.show { display: block; }
    .loading-circle {
      width: 60px; height: 60px;
      border: 3px solid rgba(255,215,0,0.2);
      border-top-color: #ffd700;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { color: #d4a840; letter-spacing: 2px; font-size: 15px; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

    /* 结果区 */
    .result-section {
      display: none;
      margin-top: 28px;
      animation: fadeInUp 0.8s ease;
    }
    .result-section.show { display: block; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-header {
      text-align: center;
      margin-bottom: 20px;
    }
    .result-name {
      font-size: 22px;
      color: #ffd700;
      letter-spacing: 4px;
    }
    .result-meta {
      font-size: 13px;
      color: #a08040;
      margin-top: 4px;
      letter-spacing: 1px;
    }

    /* 五行能量条 */
    .wuxing-section { margin-bottom: 20px; }
    .wuxing-title { font-size: 15px; color: #d4a840; letter-spacing: 2px; margin-bottom: 12px; }
    .wuxing-item {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
      gap: 10px;
    }
    .wuxing-label {
      width: 28px; font-size: 15px; text-align: center;
    }
    .wuxing-bar-bg {
      flex: 1; height: 8px;
      background: rgba(255,255,255,0.08);
      border-radius: 4px; overflow: hidden;
    }
    .wuxing-bar {
      height: 100%; border-radius: 4px;
      transition: width 1.5s ease;
      width: 0;
    }
    .wuxing-pct { font-size: 13px; color: #a08040; width: 36px; text-align: right; }

    /* 命盘格 */
    .destiny-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    .destiny-item {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,215,0,0.15);
      border-radius: 12px;
      padding: 14px 12px;
      text-align: center;
    }
    .destiny-item .d-label { font-size: 12px; color: #a08040; letter-spacing: 1px; margin-bottom: 6px; }
    .destiny-item .d-value { font-size: 20px; color: #ffd700; letter-spacing: 2px; }
    .destiny-item .d-sub { font-size: 12px; color: #c8a060; margin-top: 4px; }

    /* 运势分析块 */
    .fortune-block {
      border-radius: 14px;
      padding: 16px 18px;
      margin-bottom: 14px;
      border: 1px solid rgba(255,215,0,0.1);
      background: rgba(255,255,255,0.03);
    }
    .fortune-block .block-title {
      font-size: 15px;
      color: #ffd700;
      letter-spacing: 2px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .fortune-block .block-text {
      font-size: 14px;
      color: #d4c090;
      line-height: 1.9;
      letter-spacing: 1px;
    }

    /* 总运评分 */
    .score-ring {
      text-align: center;
      margin: 16px 0 20px;
    }
    .score-ring svg { width: 110px; height: 110px; }
    .score-ring .score-num {
      font-size: 32px;
      color: #ffd700;
      display: block;
      margin-top: 8px;
      letter-spacing: 2px;
    }
    .score-ring .score-label { font-size: 13px; color: #a08040; letter-spacing: 1px; }

    /* 吉言 */
    .lucky-words {
      text-align: center;
      padding: 20px;
      border: 1px dashed rgba(255,215,0,0.3);
      border-radius: 14px;
      margin-top: 16px;
    }
    .lucky-words .lw-title { font-size: 13px; color: #a08040; letter-spacing: 2px; margin-bottom: 10px; }
    .lucky-words .lw-text { font-size: 17px; color: #ffd700; letter-spacing: 3px; line-height: 2; }

    /* 重测按钮 */
    .btn-reset {
      display: block;
      width: 100%;
      margin-top: 24px;
      padding: 13px;
      background: transparent;
      border: 1px solid rgba(255,215,0,0.35);
      border-radius: 50px;
      font-size: 15px;
      font-family: inherit;
      color: #d4a840;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-reset:hover {
      background: rgba(255,215,0,0.08);
      border-color: rgba(255,215,0,0.6);
      color: #ffd700;
    }

    /* 分段标题 */
    .section-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 22px 0 16px;
      font-size: 13px;
      color: #a08040;
      letter-spacing: 2px;
    }
    .section-divider::before, .section-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,215,0,0.15);
    }

    /* 标签选择器（多选/单选） */
    .tag-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .tag-btn {
      padding: 7px 14px;
      border: 1px solid rgba(255,215,0,0.25);
      border-radius: 20px;
      background: rgba(255,255,255,0.04);
      color: #c8a060;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.25s;
      letter-spacing: 1px;
    }
    .tag-btn:hover { border-color: rgba(255,215,0,0.5); color: #ffd700; }
    .tag-btn.active {
      background: rgba(255,215,0,0.15);
      border-color: #ffd700;
      color: #ffd700;
      box-shadow: 0 0 8px rgba(255,215,0,0.2);
    }

    /* 星座徽章 */
    .zodiac-badge {
      display: inline-block;
      background: rgba(255,215,0,0.12);
      border: 1px solid rgba(255,215,0,0.3);
      border-radius: 8px;
      padding: 4px 12px;
      font-size: 14px;
      color: #ffd700;
      letter-spacing: 1px;
      margin-top: 8px;
    }

    /* 数字滑块 */
    .range-wrap { display: flex; align-items: center; gap: 12px; }
    .range-wrap input[type=range] {
      flex: 1;
      -webkit-appearance: none;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(to right, #ffd700 var(--pct,50%), rgba(255,255,255,0.1) var(--pct,50%));
      outline: none;
      cursor: pointer;
    }
    .range-wrap input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #ffd700;
      box-shadow: 0 0 6px rgba(255,215,0,0.6);
      cursor: pointer;
    }
    .range-val {
      min-width: 36px; text-align: center;
      font-size: 15px; color: #ffd700;
    }

    /* 结果里的额外块 */
    .extra-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }
    .extra-item {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,215,0,0.12);
      border-radius: 12px;
      padding: 12px 8px;
      text-align: center;
    }
    .extra-item .ei-icon { font-size: 22px; margin-bottom: 4px; }
    .extra-item .ei-label { font-size: 11px; color: #a08040; letter-spacing: 1px; }
    .extra-item .ei-val { font-size: 14px; color: #ffd700; margin-top: 4px; letter-spacing: 1px; }

    /* 底部 */
    .footer {
      text-align: center;
      margin-top: 40px;
      font-size: 12px;
      color: rgba(200,160,96,0.4);
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

<!-- 星空 -->
<div class="stars" id="stars"></div>

<div class="container">
  <!-- 头部 -->
  <div class="header">
    <span class="title-icon">☯️</span>
    <h1>天机测算</h1>
    <p>紫微斗数 · 八字命理 · 运势详解</p>
  </div>

  <!-- 输入表单 -->
  <div class="card" id="formCard">
    <div class="card-title">填写生辰信息</div>

    <!-- ① 基本信息 -->
    <div class="section-divider">基本信息</div>

    <div class="form-group">
      <label>姓名 <span>*</span></label>
      <input type="text" id="name" class="form-control" placeholder="请输入您的姓名" maxlength="10" />
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>年龄 <span>*</span></label>
        <input type="number" id="age" class="form-control" placeholder="岁" min="1" max="120" />
      </div>
      <div class="form-group">
        <label>性别 <span>*</span></label>
        <select id="gender" class="form-control">
          <option value="">请选择</option>
          <option value="男">男</option>
          <option value="女">女</option>
          <option value="保密">保密</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>出生日期 <span>*</span></label>
      <input type="date" id="birthday" class="form-control" onchange="autoZodiac()" />
      <div id="zodiacBadge"></div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>出生时辰 <span>*</span></label>
        <select id="shichen" class="form-control">
          <option value="">请选择时辰</option>
          <option value="子">子时（23:00-00:59）</option>
          <option value="丑">丑时（01:00-02:59）</option>
          <option value="寅">寅时（03:00-04:59）</option>
          <option value="卯">卯时（05:00-06:59）</option>
          <option value="辰">辰时（07:00-08:59）</option>
          <option value="巳">巳时（09:00-10:59）</option>
          <option value="午">午时（11:00-12:59）</option>
          <option value="未">未时（13:00-14:59）</option>
          <option value="申">申时（15:00-16:59）</option>
          <option value="酉">酉时（17:00-18:59）</option>
          <option value="戌">戌时（19:00-20:59）</option>
          <option value="亥">亥时（21:00-22:59）</option>
        </select>
      </div>
      <div class="form-group">
        <label>血型</label>
        <select id="bloodtype" class="form-control">
          <option value="">不清楚</option>
          <option value="A">A型</option>
          <option value="B">B型</option>
          <option value="O">O型</option>
          <option value="AB">AB型</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>出生地</label>
      <input type="text" id="birthplace" class="form-control" placeholder="如：北京市 / 上海市" maxlength="20" />
    </div>

    <!-- ② 生活状态 -->
    <div class="section-divider">生活状态</div>

    <div class="form-group">
      <label>职业方向</label>
      <div class="tag-group" id="tagJob">
        <button class="tag-btn" onclick="toggleTag(this,'job')">💻 互联网</button>
        <button class="tag-btn" onclick="toggleTag(this,'job')">📚 教育</button>
        <button class="tag-btn" onclick="toggleTag(this,'job')">🏥 医疗</button>
        <button class="tag-btn" onclick="toggleTag(this,'job')">🎨 创意</button>
        <button class="tag-btn" onclick="toggleTag(this,'job')">💰 金融</button>
        <button class="tag-btn" onclick="toggleTag(this,'job')">🏗️ 建筑</button>
        <button class="tag-btn" onclick="toggleTag(this,'job')">🎭 演艺</button>
        <button class="tag-btn" onclick="toggleTag(this,'job')">🔬 科研</button>
      </div>
    </div>

    <div class="form-group">
      <label>教育程度</label>
      <select id="education" class="form-control">
        <option value="">请选择</option>
        <option value="高中及以下">高中及以下</option>
        <option value="大专">大专</option>
        <option value="本科">本科</option>
        <option value="硕士">硕士</option>
        <option value="博士及以上">博士及以上</option>
      </select>
    </div>

    <!-- ③ 近期关注 -->
    <div class="section-divider">近期关注</div>

    <div class="form-group">
      <label>本次最想测算的方向（可多选）</label>
      <div class="tag-group" id="tagFocus">
        <button class="tag-btn" onclick="toggleTag(this,'focus')">💼 事业运</button>
        <button class="tag-btn" onclick="toggleTag(this,'focus')">❤️ 感情运</button>
        <button class="tag-btn" onclick="toggleTag(this,'focus')">💰 财运</button>
        <button class="tag-btn" onclick="toggleTag(this,'focus')">🌿 健康运</button>
        <button class="tag-btn" onclick="toggleTag(this,'focus')">🎓 学业运</button>
        <button class="tag-btn" onclick="toggleTag(this,'focus')">🌍 出行运</button>
      </div>
    </div>

    <div class="form-group">
      <label>近期主要困扰</label>
      <div class="tag-group" id="tagWorry">
        <button class="tag-btn" onclick="toggleTag(this,'worry')">😰 工作压力</button>
        <button class="tag-btn" onclick="toggleTag(this,'worry')">💸 财务紧张</button>
        <button class="tag-btn" onclick="toggleTag(this,'worry')">💔 感情不顺</button>
        <button class="tag-btn" onclick="toggleTag(this,'worry')">😴 身心疲惫</button>
        <button class="tag-btn" onclick="toggleTag(this,'worry')">🤝 人际关系</button>
        <button class="tag-btn" onclick="toggleTag(this,'worry')">🔀 方向迷茫</button>
      </div>
    </div>

    <!-- ④ 性格自评 -->
    <div class="section-divider">性格自评</div>

    <div class="form-group">
      <label>性格倾向</label>
      <div class="tag-group" id="tagPersona">
        <button class="tag-btn" onclick="toggleTag(this,'persona')">🌙 内向</button>
        <button class="tag-btn" onclick="toggleTag(this,'persona')">☀️ 外向</button>
        <button class="tag-btn" onclick="toggleTag(this,'persona')">🎯 理性</button>
        <button class="tag-btn" onclick="toggleTag(this,'persona')">🎨 感性</button>
        <button class="tag-btn" onclick="toggleTag(this,'persona')">📋 计划型</button>
        <button class="tag-btn" onclick="toggleTag(this,'persona')">🌊 随性型</button>
      </div>
    </div>

    <div class="form-group">
      <label>近一年整体状态自评
        <span style="color:#a08040;font-size:12px;">（1=很差，10=很好）</span>
      </label>
      <div class="range-wrap">
        <input type="range" id="selfScore" min="1" max="10" value="6"
          oninput="updateRange(this,'selfScoreVal')" />
        <span class="range-val" id="selfScoreVal">6</span>
      </div>
    </div>

    <div class="form-group">
      <label>当前财务压力
        <span style="color:#a08040;font-size:12px;">（1=轻松，10=极大）</span>
      </label>
      <div class="range-wrap">
        <input type="range" id="moneyPressure" min="1" max="10" value="5"
          oninput="updateRange(this,'moneyPressureVal')" />
        <span class="range-val" id="moneyPressureVal">5</span>
      </div>
    </div>

    <div class="form-group">
      <label>补充心愿（可选）</label>
      <textarea id="wish" class="form-control" rows="2"
        placeholder="写下您最近的一个心愿或困惑，天机将为您指引…" maxlength="80"
        style="resize:none;line-height:1.8;"></textarea>
    </div>

    <!-- 加载中 -->
    <div class="loading" id="loading">
      <div class="loading-circle"></div>
      <p>天机运转中，请稍候…</p>
    </div>

    <button class="btn-fortune" id="btnFortune" onclick="startFortune()">✨ 开始测算 ✨</button>
  </div>

  <!-- 结果区 -->
  <div class="result-section" id="resultSection">
    <div class="card">
      <div class="result-header">
        <div class="result-name" id="resName"></div>
        <div class="result-meta" id="resMeta"></div>
      </div>

      <!-- 总运评分环 -->
      <div class="score-ring">
        <svg viewBox="0 0 110 110">
          <circle cx="55" cy="55" r="46" fill="none" stroke="rgba(255,215,0,0.1)" stroke-width="8"/>
          <circle id="scoreArc" cx="55" cy="55" r="46" fill="none"
            stroke="url(#goldGrad)" stroke-width="8"
            stroke-linecap="round"
            stroke-dasharray="289"
            stroke-dashoffset="289"
            transform="rotate(-90 55 55)"
            style="transition: stroke-dashoffset 2s ease;"/>
          <defs>
            <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#b8860b"/>
              <stop offset="100%" stop-color="#ffd700"/>

  // ========== 工具函数 ==========

  function updateRange(el, valId) {
    document.getElementById(valId).textContent = el.value;
    const pct = (el.value - el.min) / (el.max - el.min) * 100;
    el.style.setProperty('--pct', pct + '%');

  // 初始化滑块显示
  document.querySelectorAll('input[type=range]').forEach(el => updateRange(el, el.id + 'Val'));

  // ========== 星座计算 ==========
  const zodiacList = [
    { name:'摩羯座',icon:'♑',end:[1,19] },
    { name:'水瓶座',icon:'♒',end:[2,18] },
    { name:'双鱼座',icon:'♓',end:[3,20] },

  const careerTexts = [
    '此命格五行调和，事业运势稳中有升，宜把握今年下半年的贵人相助之机，主动出击，可望有所突破。财运方面有偏财入局，投资宜稳健保守，切忌冒进。',
    '命局中印星旺盛，学识渊博为本命最大优势，适合从事文教、策划、研究等领域。今年行运逢吉，宜拓展人脉，机遇不可错过。',
    '此格局事业宫得令，适合自主创业或独当一面。但需防小人口舌，行事低调为宜，切忌财不露白。',
    '官杀混杂，事业压力较大，宜调整心态，以退为进。今年贵人星入命，可借助他人之力化解困局，逢凶化吉。',
  ];
  const loveTexts = {
    '单身':   '桃花星入命宫，今年邂逅命中有缘人的概率极高，宜主动拓展社交圈，缘分就在转角处。',
    '恋爱中': '红鸾星照命，感情进一步升温，双方磁场高度契合。今年有望推进关系，可认真考虑下一步。',
    '已婚':   '夫妻宫得福星坐守，婚姻稳固美满。今年宜共同规划家庭蓝图，财运家运双双向好。',

    '离异':   '命盘显示新的感情缘分已在路上，伤痛乃蜕变前奏。调整心态，相信自己值得更好的，新缘将至。',

  const healthTexts = [
    '今年健康整体平稳，但需注意肝胆及消化系统的保养，宜多饮水、规律作息、适当运动。秋季注意防范呼吸道疾病。',

  function hash(str) {
    let h = 0;
    for (let c of str) h = (h * 31 + c.charCodeAt(0)) & 0xffffffff;
    return Math.abs(h);
  }

  function calcBazi(year, month, day, shichen) {
    const base = 1864;
    const yIdx = (year - base) % 60;
    const nianGan = tianGan[((yIdx % 10) + 10) % 10];
    const nianZhi = diZhi[((yIdx % 12) + 12) % 12];
    const mGan = tianGan[((month + (year * 2)) % 10 + 10) % 10];
    const mZhi = diZhi[((month + 1) % 12 + 12) % 12];
    const dBase = Math.floor((year - 1900) * 365.25) + Math.floor((month - 1) * 30.6) + day;
    const dGan = tianGan[(dBase % 10 + 10) % 10];
    const dZhi = diZhi[(dBase % 12 + 12) % 12];
    const shiIdx = diZhi.indexOf(shichen);
    const sGan = tianGan[((shiIdx + Math.floor(dBase % 5) * 2) % 10 + 10) % 10];
    return [
      { zhu: '年柱', gan: nianGan, zhi: nianZhi },
      { zhu: '月柱', gan: mGan, zhi: mZhi },
      { zhu: '日柱', gan: dGan, zhi: dZhi },
      { zhu: '时柱', gan: sGan, zhi: shichen },
    ];
  }

  function calcWuxing(bazi) {
    const counts = { '木':0,'火':0,'土':0,'金':0,'水':0 };
    bazi.forEach(p => {
      if (wuxingMap[p.gan]) counts[wuxingMap[p.gan]]++;
      if (diZhiWuxing[p.zhi]) counts[diZhiWuxing[p.zhi]]++;
    });
    const total = Object.values(counts).reduce((a,b)=>a+b, 0);
    return Object.fromEntries(Object.entries(counts).map(([k,v])=>[k, Math.round(v/total*100)]));
  }

  function getRand(arr, seed) {
    return arr[seed % arr.length];
  }

  // ========== 主流程 ==========
  function startFortune() {
    const name = document.getElementById('name').value.trim();
    const age = document.getElementById('age').value;
    const gender = document.getElementById('gender').value;
    const birthday = document.getElementById('birthday').value;
    const shichen = document.getElementById('shichen').value;
    const loveVal = getTagValues('tagLove')[0] || '';

    if (!name || !age || !gender || !birthday || !shichen) {
      alert('请填写所有必填信息（姓名、年龄、性别、生日、出生时辰）');
      return;
    }

    const btn = document.getElementById('btnFortune');
    const loading = document.getElementById('loading');
    btn.style.display = 'none';
    loading.classList.add('show');

    setTimeout(() => {
      loading.classList.remove('show');
      btn.style.display = 'block';
      showResult();
    }, 2800);
  }

  function showResult() {
    const name     = document.getElementById('name').value.trim();
    const age      = document.getElementById('age').value;
    const gender   = document.getElementById('gender').value;
    const birthday = document.getElementById('birthday').value;
    const shichen  = document.getElementById('shichen').value;
    const blood    = document.getElementById('bloodtype').value;

    const wish     = document.getElementById('wish').value.trim();
    const jobVals  = getTagValues('tagJob');
    const focusVals= getTagValues('tagFocus');
    const worryVals= getTagValues('tagWorry');
    const personaVals = getTagValues('tagPersona');

    const [year, month, day] = birthday.split('-').map(Number);
    const seed = hash(name + birthday + shichen);
    const zodiac = getZodiac(month, day);
    const sx = getSx(year);

    // 四柱 & 五行
    const bazi = calcBazi(year, month, day, shichen);
    const wx = calcWuxing(bazi);

    // 评分：基础 + 自评加成
    const basScore = 65 + (seed % 25);
    const selfBonus = Math.round((parseInt(selfScore) - 5) * 0.8);
    const score = Math.min(99, Math.max(50, basScore + selfBonus));

    // 渲染头部
    document.getElementById('resName').textContent = `${name} · ${gender}`;
    document.getElementById('resMeta').textContent =
      `${birthday} · ${shichen}时 · ${age}岁 · ${zodiac.icon}${zodiac.name}` +
      (blood ? ` · ${blood}型` : '') + (edu ? ` · ${edu}` : '');

    setTimeout(() => {
      const arc = document.getElementById('scoreArc');
      arc.style.strokeDashoffset = 289 - (289 * score / 100);

    // 额外三宫格
    const luckyColor = ['红','蓝','绿','金','紫','白'][seed % 6];
    const luckyNum = (seed % 9) + 1;
    const luckyDir = ['东','南','西','北','东南','西南','东北','西北'][seed % 8];
    document.getElementById('extraRow').innerHTML = `
      <div class="extra-item">
        <div class="ei-icon">${zodiac.icon}</div>
        <div class="ei-label">星座</div>

        <div class="ei-icon">🐉</div>
        <div class="ei-label">生肖</div>
        <div class="ei-val">${sx}年</div>
      </div>
      <div class="extra-item">
        <div class="ei-icon">🍀</div>
        <div class="ei-label">幸运</div>
        <div class="ei-val">${luckyColor}色·${luckyNum}·${luckyDir}</div>
      </div>
    `;

    // 五行条
    const wxContainer = document.getElementById('wuxingBars');
    wxContainer.innerHTML = Object.entries(wx).map(([k, v]) => `
      <div class="wuxing-item">
        <span class="wuxing-label">${wuxingIcons[k]}${k}</span>
        <div class="wuxing-bar-bg">
          <div class="wuxing-bar" data-pct="${v}" style="background:${wuxingColors[k]};"></div>

      document.querySelectorAll('.wuxing-bar').forEach(bar => {

    if (wish) {
      blocksHtml += `

    // 展示
    document.getElementById('resultSection').classList.add('show');
    document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function resetForm() {
    document.getElementById('resultSection').classList.remove('show');
    document.getElementById('formCard').scrollIntoView({ behavior: 'smooth' });
    ['name','age','birthday','birthplace','wish'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
    ['gender','shichen','bloodtype','education'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('zodiacBadge').innerHTML = '';
    document.querySelectorAll('.tag-btn.active').forEach(b => b.classList.remove('active'));
    ['selfScore','moneyPressure'].forEach(id => {
      const el = document.getElementById(id);
      el.value = id === 'selfScore' ? 6 : 5;
      updateRange(el, id + 'Val');
    });
  }
</script>
</body>
</html>
